name: Publish actions-runner

on:
  push:
    branches:
      - main
    paths:
      - images/actions-runner/Dockerfile
      - images/actions-runner/Aptfile
      - .github/workflows/publish-actions-runner.yml
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/actions-runner

jobs:
  publish:
    # Bootstrap : le pool self-hosted est jammé par la taxe apt-get zstd que
    # cette image corrige (deadlock poule/œuf). On build sur GitHub-hosted pour
    # le premier build, puis on repasse à self-hosted une fois le pool assaini.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: network=host

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect image version
        id: version
        run: |
          version=$(sed -n 's|^FROM ghcr.io/falcondev-oss/actions-runner:\([^@]*\)@.*$|\1|p' images/actions-runner/Dockerfile)
          if [ -z "$version" ]; then
            echo "Unable to detect actions-runner version from images/actions-runner/Dockerfile" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: images/actions-runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
